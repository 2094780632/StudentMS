<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="row mb-3">
        <div class="col-md-6">
            <h2><i class="bi bi-person-badge"></i> 用户管理</h2>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/user/add}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> 新增用户</a>
        </div>
    </div>

    <!-- 搜索框 -->
    <div class="card mb-3">
        <div class="card-body">
            <form method="get" th:action="@{/user/list}" class="row g-3">
                <div class="col-md-10">
                    <input type="text" name="keyword" class="form-control" placeholder="按用户名搜索" th:value="${keyword}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100"><i class="bi bi-search"></i> 查询</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 表格 -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>用户名</th>
                <th>真实姓名</th>
                <th>身份</th>
                <th>角色</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}"></td>
                <td th:text="${u.fullname}"></td>
                <td>
                    <span th:if="${u.identity == 'TEACHER'}" class="badge bg-warning text-dark">👨‍🏫 老师</span>
                    <span th:if="${u.identity == 'STUDENT'}" class="badge bg-info text-dark">🧑‍🎓 学生</span>
                    <span th:unless="${u.identity == 'TEACHER' or u.identity == 'STUDENT'}" class="badge bg-secondary">-</span>
                </td>
                <td>
                    <span th:if="${u.role == 'ROLE_ADMIN'}" class="badge bg-danger">ADMIN</span>
                    <span th:unless="${u.role == 'ROLE_ADMIN'}" class="badge bg-primary">USER</span>
                </td>
                <td>
                    <span th:if="${u.enabled}" class="badge bg-success">启用</span>
                    <span th:unless="${u.enabled}" class="badge bg-secondary">停用</span>
                </td>
                <td>
                    <a th:href="@{/user/edit/{id}(id=${u.id})}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/user/delete/{id}(id=${u.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('确定要删除该用户吗？')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${users.isEmpty()}">
                <td colspan="6" class="text-center text-muted">暂无用户数据</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/user/list(page=${currentPage - 1}, keyword=${keyword})}">上一页</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${currentPage} + ' / ' + ${totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/user/list(page=${currentPage + 1}, keyword=${keyword})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
