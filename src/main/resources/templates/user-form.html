<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4><i class="bi bi-person-plus"></i> <span th:text="${user.id} ? '编辑用户' : '新增用户'"></span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/user/save}" th:object="${user}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" th:field="*{username}" required
                                   th:readonly="${user.id != null}">
                            <div class="form-text" th:if="${user.id != null}">用户名不可修改</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">真实姓名</label>
                            <input type="text" class="form-control" th:field="*{fullname}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   th:required="${user.id == null}"
                                   th:placeholder="${user.id != null} ? '留空则不修改密码' : ''">
                            <div class="form-text" th:if="${user.id != null}">留空则不修改密码</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">角色</label>
                            <select class="form-control" th:field="*{role}">
                                <option value="ROLE_ADMIN">ADMIN</option>
                                <option value="ROLE_USER">USER</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">身份</label>
                            <select class="form-control" th:field="*{identity}">
                                <option value="TEACHER">老师</option>
                                <option value="STUDENT">学生</option>
                            </select>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{enabled}">
                            <label class="form-check-label">启用状态</label>
                        </div>

                        <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> 保存</button>
                        <a th:href="@{/user/list}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> 返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
