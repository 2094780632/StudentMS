<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的老师</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-person-workspace"></i> 我的科任老师</h2>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>老师姓名</th>
                <th>教授科目</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="d : ${teacherDetails}">
                <td th:text="${d.teacherName}"></td>
                <td><span class="badge bg-primary" th:text="${d.subject}"></span></td>
            </tr>
            <tr th:if="${teacherDetails.isEmpty()}">
                <td colspan="2" class="text-center text-muted">暂无科任老师</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
