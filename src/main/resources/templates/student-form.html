<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4><i class="bi bi-person-plus"></i> <span th:text="${student.id} ? '编辑学生信息' : '新增学生'"></span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/student/save}" th:object="${student}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">学号</label>
                            <input type="text" class="form-control" th:field="*{studentId}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">性别</label>
                            <select class="form-control" th:field="*{gender}">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">年龄</label>
                            <input type="number" class="form-control" th:field="*{age}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">班级</label>
                            <input type="text" class="form-control" th:field="*{className}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">专业</label>
                            <input type="text" class="form-control" th:field="*{major}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">年级</label>
                            <select class="form-control" th:field="*{grade}">
                                <option value="">-- 请选择 --</option>
                                <option value="高一">高一</option>
                                <option value="高二">高二</option>
                                <option value="高三">高三</option>
                            </select>
                        </div>

                        <!-- 科任老师分配（仅管理员可见） -->
                        <div class="mb-3" sec:authorize="hasRole('ADMIN')">
                            <label class="form-label">科任老师分配</label>
                            <div id="teacherSubjectContainer">
                                <!-- 已有关系（编辑时显示） -->
                                <div th:each="rel, iter : ${existingRelations}" class="row mb-2 teacher-subject-row">
                                    <div class="col-5">
                                        <select name="teacherIds" class="form-control">
                                            <option value="">-- 老师 --</option>
                                            <option th:each="t : ${teacherList}" th:value="${t.id}"
                                                    th:text="${t.fullname}"
                                                    th:selected="${t.id == rel.teacherId}"></option>
                                        </select>
                                    </div>
                                    <div class="col-5">
                                        <select name="subjectNames" class="form-control">
                                            <option value="">-- 科目 --</option>
                                            <option th:each="s : ${subjects}" th:value="${s}"
                                                    th:text="${s}"
                                                    th:selected="${s == rel.subject}"></option>
                                        </select>
                                    </div>
                                    <div class="col-2">
                                        <button type="button" class="btn btn-danger btn-sm remove-row">✕</button>
                                    </div>
                                </div>
                                <!-- 默认空行（新增时） -->
                                <div th:if="${existingRelations == null or existingRelations.isEmpty()}" class="row mb-2 teacher-subject-row">
                                    <div class="col-5">
                                        <select name="teacherIds" class="form-control">
                                            <option value="">-- 老师 --</option>
                                            <option th:each="t : ${teacherList}" th:value="${t.id}" th:text="${t.fullname}"></option>
                                        </select>
                                    </div>
                                    <div class="col-5">
                                        <select name="subjectNames" class="form-control">
                                            <option value="">-- 科目 --</option>
                                            <option th:each="s : ${subjects}" th:value="${s}" th:text="${s}"></option>
                                        </select>
                                    </div>
                                    <div class="col-2">
                                        <button type="button" class="btn btn-danger btn-sm remove-row">✕</button>
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn btn-outline-secondary btn-sm mt-1" onclick="addTeacherSubjectRow()">
                                <i class="bi bi-plus"></i> 添加科任老师
                            </button>
                        </div>

                        <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> 保存</button>
                        <a href="/student/list" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> 返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function addTeacherSubjectRow() {
        const container = document.getElementById('teacherSubjectContainer');
        const row = document.createElement('div');
        row.className = 'row mb-2 teacher-subject-row';
        // 克隆第一个select的选项
        const firstSelect = container.querySelector('select[name="teacherIds"]');
        const secondSelect = container.querySelector('select[name="subjectNames"]');
        row.innerHTML = `
            <div class="col-5">
                <select name="teacherIds" class="form-control">${firstSelect ? firstSelect.innerHTML : '<option value="">-- 老师 --</option>'}</select>
            </div>
            <div class="col-5">
                <select name="subjectNames" class="form-control">${secondSelect ? secondSelect.innerHTML : '<option value="">-- 科目 --</option>'}</select>
            </div>
            <div class="col-2">
                <button type="button" class="btn btn-danger btn-sm remove-row" onclick="this.closest('.teacher-subject-row').remove()">✕</button>
            </div>
        `;
        container.appendChild(row);
    }
    // 绑定已有删除按钮
    document.querySelectorAll('.remove-row').forEach(btn => {
        btn.addEventListener('click', function() {
            this.closest('.teacher-subject-row').remove();
        });
    });
</script>
</body>
</html>
