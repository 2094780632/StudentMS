<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4><i class="bi bi-person-plus"></i> <span th:text="${student.id} ? '编辑学生信息' : '新增学生'"></span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/student/save}" th:object="${student}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">学号</label>
                            <input type="text" class="form-control" th:field="*{studentId}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">性别</label>
                            <select class="form-control" th:field="*{gender}">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">年龄</label>
                            <input type="number" class="form-control" th:field="*{age}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">班级</label>
                            <input type="text" class="form-control" th:field="*{className}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">专业</label>
                            <input type="text" class="form-control" th:field="*{major}" required>
                        </div>

                        <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> 保存</button>
                        <a href="/student/list" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> 返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
