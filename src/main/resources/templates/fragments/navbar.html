<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-building"></i> 学生管理系统
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/student/list}">
                        <i class="bi bi-person-lines-fill"></i> 学生管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/teacher-student/my-students}">
                        <i class="bi bi-people-fill"></i> 我的学生
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/teacher-student/my-teachers}">
                        <i class="bi bi-person-workspace"></i> 我的老师
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/user/list}">
                        <i class="bi bi-person-badge"></i> 用户管理
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/log/list}">
                        <i class="bi bi-clock-history"></i> 操作日志
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <span class="navbar-text me-3">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name">用户</span>
                </span>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
