<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作日志</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
<div class="container mt-4">
    <h2><i class="bi bi-clock-history"></i> 操作日志</h2>
    <!-- 筛选表单 -->
    <div class="card mb-3">
        <div class="card-body">
            <form method="get" action="/log/list" class="row g-3">
                <div class="col-md-9">
                    <input type="text" name="username" class="form-control" placeholder="按用户名筛选" th:value="${usernameFilter}">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-outline-primary w-100"><i class="bi bi-funnel"></i> 筛选</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>操作人</th>
                <th>操作类型</th>
                <th>详情</th>
                <th>IP地址</th>
                <th>操作时间</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${logs}">
                <td th:text="${log.username}"></td>
                <td th:text="${log.operation}"></td>
                <td th:text="${log.detail}"></td>
                <td th:text="${log.ip}"></td>
                <td th:text="${#temporals.format(log.createTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
            </tr>
            <tr th:if="${logs.isEmpty()}">
                <td colspan="5" class="text-center text-muted">暂无日志记录</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/log/list(page=${currentPage-1}, username=${usernameFilter})}">上一页</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${currentPage} + ' / ' + ${totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/log/list(page=${currentPage+1}, username=${usernameFilter})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
