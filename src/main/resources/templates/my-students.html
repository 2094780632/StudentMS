<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的学生</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-people-fill"></i> 我的学生</h2>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>学号</th>
                <th>姓名</th>
                <th>班级</th>
                <th>专业</th>
                <th>我教授的科目</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.studentId}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.className}"></td>
                <td th:text="${s.major}"></td>
                <td>
                    <small>
                        <span th:each="detail, iter : ${tsService.getTeacherSubjectDetails(s.id)}">
                            <span th:text="${detail.subject}"></span><span th:unless="${iter.last}">、</span>
                        </span>
                    </small>
                </td>
            </tr>
            <tr th:if="${students.isEmpty()}">
                <td colspan="5" class="text-center text-muted">暂无负责学生</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
