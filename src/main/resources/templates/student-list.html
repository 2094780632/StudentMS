<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="row mb-3">
        <div class="col-md-6">
            <h2><i class="bi bi-person-graduate"></i> 学生信息管理</h2>
        </div>
        <div class="col-md-6 text-end">
            <a href="/student/add" class="btn btn-primary"><i class="bi bi-plus-circle"></i> 新增学生</a>
        </div>
    </div>

    <!-- 搜索框 -->
    <div class="card mb-3">
        <div class="card-body">
            <form method="get" action="/student/list" class="row g-3">
                <div class="col-md-10">
                    <input type="text" name="keyword" class="form-control" placeholder="按姓名或学号搜索" th:value="${keyword}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100"><i class="bi bi-search"></i> 查询</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 表格 -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>学号</th>
                <th>姓名</th>
                <th>性别</th>
                <th>年龄</th>
                <th>班级</th>
                <th>专业</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.studentId}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.gender}"></td>
                <td th:text="${s.age}"></td>
                <td th:text="${s.className}"></td>
                <td th:text="${s.major}"></td>
                <td>
                    <a th:href="@{/student/edit/{id}(id=${s.id})}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/student/delete/{id}(id=${s.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('确定要删除该学生吗？')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${students.isEmpty()}">
                <td colspan="7" class="text-center text-muted">暂无学生数据</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/student/list(page=${currentPage-1}, keyword=${keyword})}">上一页</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${currentPage} + ' / ' + ${totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/student/list(page=${currentPage+1}, keyword=${keyword})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
