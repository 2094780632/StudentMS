<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-speedometer2"></i> 控制面板</h2>

    <!-- ==================== 管理员视图 ==================== -->
    <th:block sec:authorize="hasRole('ADMIN')">
        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="card text-white bg-primary">
                    <div class="card-body text-center">
                        <i class="bi bi-mortarboard-fill display-4"></i>
                        <h3 class="mt-2" th:text="${studentCount}">0</h3>
                        <p class="card-text">学生总数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-white bg-success">
                    <div class="card-body text-center">
                        <i class="bi bi-person-badge display-4"></i>
                        <h3 class="mt-2" th:text="${userCount}">0</h3>
                        <p class="card-text">用户总数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-white bg-warning">
                    <div class="card-body text-center">
                        <i class="bi bi-person-workspace display-4"></i>
                        <h3 class="mt-2" th:text="${teacherCount}">0</h3>
                        <p class="card-text">👨‍🏫 教师人数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-white bg-info">
                    <div class="card-body text-center">
                        <i class="bi bi-emoji-smile display-4"></i>
                        <h3 class="mt-2" th:text="${studentUserCount}">0</h3>
                        <p class="card-text">🧑‍🎓 学生人数</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="card text-white bg-secondary">
                    <div class="card-body text-center">
                        <i class="bi bi-clipboard-data display-4"></i>
                        <h3 class="mt-2" th:text="${logTodayCount}">0</h3>
                        <p class="card-text">今日操作</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快速入口 -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <a th:href="@{/student/list}" class="btn btn-outline-primary w-100">
                    <i class="bi bi-person-lines-fill"></i> 学生管理
                </a>
            </div>
            <div class="col-md-3 mb-3">
                <a th:href="@{/user/list}" class="btn btn-outline-primary w-100">
                    <i class="bi bi-person-badge"></i> 用户管理
                </a>
            </div>
            <div class="col-md-3 mb-3">
                <a th:href="@{/log/list}" class="btn btn-outline-primary w-100">
                    <i class="bi bi-clock-history"></i> 操作日志
                </a>
            </div>
            <div class="col-md-3 mb-3">
                <a th:href="@{/teacher-student/my-students}" class="btn btn-outline-success w-100">
                    <i class="bi bi-people-fill"></i> 我的学生
                </a>
            </div>
        </div>

        <!-- 最近操作动态 -->
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="bi bi-activity"></i> 最近操作动态</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-secondary">
                        <tr>
                            <th>操作人</th>
                            <th>操作类型</th>
                            <th>详情</th>
                            <th>IP地址</th>
                            <th>操作时间</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="log : ${recentLogs}">
                            <td th:text="${log.username}"></td>
                            <td th:text="${log.operation}"></td>
                            <td th:text="${log.detail}"></td>
                            <td th:text="${log.ip}"></td>
                            <td th:text="${#temporals.format(log.createTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                        </tr>
                        <tr th:if="${recentLogs.isEmpty()}">
                            <td colspan="5" class="text-center text-muted">暂无操作记录</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block>

    <!-- ==================== 教师视图 ==================== -->
    <th:block th:if="${currentUser != null and currentUser.identity == 'TEACHER' and currentUser.role != 'ROLE_ADMIN'}">
        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-primary">
                    <div class="card-body text-center">
                        <i class="bi bi-people-fill display-4"></i>
                        <h3 class="mt-2" th:text="${myStudentCount}">0</h3>
                        <p class="card-text">我负责的学生</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-success">
                    <div class="card-body text-center">
                        <i class="bi bi-book display-4"></i>
                        <h3 class="mt-2" th:text="${studentCount}">0</h3>
                        <p class="card-text">全校学生总数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-info">
                    <div class="card-body text-center">
                        <i class="bi bi-person-badge display-4"></i>
                        <h3 class="mt-2" th:text="${userCount}">0</h3>
                        <p class="card-text">系统用户总数</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快速入口 -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <a th:href="@{/student/list}" class="btn btn-outline-primary w-100">
                    <i class="bi bi-person-lines-fill"></i> 学生管理
                </a>
            </div>
            <div class="col-md-4 mb-3">
                <a th:href="@{/student/add}" class="btn btn-outline-success w-100">
                    <i class="bi bi-plus-circle"></i> 新增学生
                </a>
            </div>
            <div class="col-md-4 mb-3">
                <a th:href="@{/teacher-student/my-students}" class="btn btn-outline-info w-100">
                    <i class="bi bi-people-fill"></i> 我的学生
                </a>
            </div>
        </div>

        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i>
            欢迎您，<strong th:text="${currentUser.fullname}"></strong> 老师！您可以在此管理您负责的班级和学生信息。
        </div>
    </th:block>

    <!-- ==================== 学生视图 ==================== -->
    <th:block th:if="${currentUser != null and currentUser.identity == 'STUDENT'}">
        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-primary">
                    <div class="card-body text-center">
                        <i class="bi bi-person-workspace display-4"></i>
                        <h3 class="mt-2" th:text="${myTeacherCount}">0</h3>
                        <p class="card-text">我的科任老师</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-success">
                    <div class="card-body text-center">
                        <i class="bi bi-mortarboard-fill display-4"></i>
                        <h3 class="mt-2" th:text="${studentCount}">0</h3>
                        <p class="card-text">全校学生总数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-info">
                    <div class="card-body text-center">
                        <i class="bi bi-people display-4"></i>
                        <h3 class="mt-2" th:text="${teacherCount}">0</h3>
                        <p class="card-text">全校教师人数</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 我的科任老师列表 -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-workspace"></i> 我的科任老师</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-secondary">
                        <tr>
                            <th>老师姓名</th>
                            <th>教授科目</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${myTeachers}">
                            <td th:text="${t.teacherName}"></td>
                            <td><span class="badge bg-primary" th:text="${t.subject}"></span></td>
                        </tr>
                        <tr th:if="${myTeachers.isEmpty()}">
                            <td colspan="2" class="text-center text-muted">暂无科任老师，请联系管理员分配</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 快速入口 -->
        <div class="row mb-4">
            <div class="col-md-12 mb-3">
                <a th:href="@{/teacher-student/my-teachers}" class="btn btn-outline-primary w-100">
                    <i class="bi bi-person-workspace"></i> 查看所有老师
                </a>
            </div>
        </div>

        <div class="alert alert-success">
            <i class="bi bi-emoji-smile"></i>
            欢迎你，<strong th:text="${currentUser.fullname}"></strong> 同学！祝你学习进步 🎓
        </div>
    </th:block>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
